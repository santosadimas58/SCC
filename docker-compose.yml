services:
    app:
        build:
            context: .
            dockerfile: .docker/php/Dockerfile
            target: dev
            args:
                WWWUSER: ${WWWUSER:-1000}
                WWWGROUP: ${WWWGROUP:-1000}
        restart: always
        container_name: scc-app
        working_dir: /var/www
        ports:
            - "8010:8000"
            - "5176:5173"
        volumes:
            - .:/var/www
            - .docker/php/supervisord.conf:/etc/supervisord.conf
            - .docker/php/supervisor.conf:/etc/supervisor/conf.d/supervisor.conf
        depends_on:
            - mysql
            - redis
        networks:
            - WebFPTE

    nginx:
        image: nginx:alpine
        container_name: scc-nginx
        restart: always
        ports:
            - "8088:80"
        volumes:
            - .:/var/www
            - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - WebFPTE

    mysql:
        image: mysql:8.0
        container_name: scc-mysql
        restart: always
        environment:
            MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
            MYSQL_ROOT_HOST: "%"
            MYSQL_DATABASE: ${DB_DATABASE}
            # MYSQL_USER: ${DB_USERNAME}
            # MYSQL_PASSWORD: ${DB_PASSWORD}
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - WebFPTE
        ports:
            - "3314:3306"

    redis:
        image: redis:alpine
        container_name: scc-redis
        restart: always
        volumes:
            - redis_data:/data
        networks:
            - WebFPTE

volumes:
    mysql_data:
    redis_data:

networks:
    WebFPTE:
        driver: bridge
